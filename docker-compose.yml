# docker-compose.yml

services:
  db:
    image: postgres:15-alpine
    container_name: payflow_db
    environment:
      POSTGRES_USER: payflow_user
      POSTGRES_PASSWORD: payflow_secret
      POSTGRES_DB: payflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payflow_user -d payflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    container_name: payflow_mailhog
    ports:
      - "1025:1025" # SMTP server
      - "8025:8025" # Web UI

  migrate:
    image: migrate/migrate
    container_name: payflow_migrate
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://payflow_user:payflow_secret@db:5432/payflow_db?sslmode=disable", "up"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # This service is for running the app locally for development
  # It mounts the code, so you get hot-reloading with a tool like air
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payflow_app
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - DB_URL=postgres://payflow_user:payflow_secret@db:5432/payflow_db?sslmode=disable
      - SERVER_PORT=8080
      - LOG_LEVEL=debug
      - LOG_PRETTY=true
      - JWT_SECRET=a-very-secret-and-strong-key-that-is-at-least-32-chars-long
      - JWT_EXPIRATION_HOURS=72
      - KORAPAY_API_KEY=
      - KORAPAY_PUBLIC_KEY=
      - KORAPAY_BASE_URL=https://api.korapay.com/v1

volumes:
  postgres_data: