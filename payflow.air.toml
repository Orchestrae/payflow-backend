# .air.toml
root = "."
tmp_dir = "tmp"

[build]
# Reduce memory during compile (helps on Railway/low-memory containers)
cmd = "GOGC=50 GOMAXPROCS=2 go build -ldflags='-s -w' -o ./tmp/main ./cmd/server"
bin = "./tmp/main"
full_bin = "APP_ENV=dev ./tmp/main"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["assets", "tmp", "vendor"]
log = "air_errors.log"
delay = 1000 # ms

[log]
time = true

[color]
main = "yellow"
runner = "green"
watcher = "cyan"
build = "blue"
app = "magenta"